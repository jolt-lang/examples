<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>{{name}} — ring on jolt</title>
  </head>
  <body>
    <h1>Hello {{name|upper}}!</h1>
    {% if motd %}<p class="motd">{{motd}}</p>{% endif %}
    <ul>
      {% for f in features %}<li>{{f}}</li>
      {% endfor %}
    </ul>
    <form action="/" method="get">
      <input name="name" placeholder="your name">
      <button type="submit">greet</button>
    </form>
  </body>
</html>
