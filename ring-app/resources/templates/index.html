<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>{{name}} — ring on jolt</title>
  </head>
  <body>
    <h1>Hello {{name|upper}}!</h1>
    {% if motd %}<p class="motd">{{motd}}</p>{% endif %}
    <ul>
      {% for f in features %}<li>{{f}}</li>
      {% endfor %}
    </ul>
    <form action="/sign" method="post">
      <input name="name" placeholder="your name">
      <button type="submit">sign the guestbook</button>
    </form>
    <h2>{{count}} signatures</h2>
    <ol class="guestbook">
      {% for g in greetings %}<li>{{g.name}} <small>{{g.created_at}}</small></li>
      {% endfor %}
    </ol>
  </body>
</html>
